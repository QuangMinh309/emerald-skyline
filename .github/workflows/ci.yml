name: Emerald Skyline CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # Kiểm tra xem folder nào thay đổi
  changes:
    runs-on: ubuntu-latest
    outputs:
      be: ${{ steps.filter.outputs.be }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            be:
              - 'be/**'
            web:
              - 'web-fe/**'
            mobile:
              - 'mobile-fe/**'

  # Tự động gán nhãn phân loại service
  labeler:
    name: Auto Label PR
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5

  code-quality:
    name: Check Code Quality (Biome)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Bắt buộc phải có để Biome tính toán được file nào vừa bị change

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome check (CI mode)
        # Thêm --since=main để tường minh
        run: biome ci --changed --since=main --no-errors-on-unmatched .

  build-backend:
    name: Build NestJS Backend
    needs: [changes, code-quality] # Check format và lint, đảm bảo có thay đổi trước khi build
    if: ${{ needs.changes.outputs.be == 'true' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: be/package-lock.json

      - name: Install Backend Deps
        run: cd be && npm ci

      - name: Build Backend
        run: cd be && npm run build

      - name: Size Monitor
        run: |
          echo "### Backend Build Size" >> $GITHUB_STEP_SUMMARY
          du -sh be/dist >> $GITHUB_STEP_SUMMARY

  build-frontend:
    name: Build React Web
    needs: [changes, code-quality]
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web-fe/package-lock.json

      - name: Install Frontend Deps
        run: cd web-fe && npm ci

      - name: Build Frontend
        run: cd web-fe && npm run build

      - name: Size Monitor
        run: |
          echo "### Web Build Size" >> $GITHUB_STEP_SUMMARY
          (du -sh web-fe/dist || du -sh web-fe/build) >> $GITHUB_STEP_SUMMARY

  # Type-Check Mobile (React Native)
  check-mobile:
    name: Type Check Mobile
    needs: [changes, code-quality]
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile-fe/package-lock.json

      - name: Install Deps
        run: cd mobile-fe && npm ci

      - name: Type Check
        # Lệnh này kiểm tra lỗi TypeScript mà không cần build APK
        run: cd mobile-fe && npx tsc --noEmit

  # Job Test (Khi nào viết test case thì mở ra dùng)
