name: Emerald Skyline CI/CD
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
    tags: ["v*"] # Kích hoạt build Mobile khi tạo tag v1.0.0, v1.1...
  pull_request:
    branches: ["main"]

jobs:
  # Gán nhãn tự động cho PR (dựa trên folder thay đổi)
  labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Chỉ chạy khi có Pull Request
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5
        with:
          # GitHub sẽ tự tìm file .github/labeler.yml
          sync-labels: true

  # Phân tích thay đổi
  changes:
    runs-on: ubuntu-latest
    outputs:
      be: ${{ steps.filter.outputs.be }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            be: ['be/**']
            web: ['web-fe/**']
            mobile: ['mobile-fe/**']
            ai: ['ai/**']

  # Kiểm tra chất lượng toàn repo
  code-quality:
    name: Check Quality (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: biomejs/setup-biome@v2
      - run: biome ci --changed --since=main --no-errors-on-unmatched .

  # Build backend nếu folder be thay đổi
  build-backend:
    needs: [changes, code-quality]
    if: ${{ needs.changes.outputs.be == 'true' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Check
        run: cd be && docker build -t emerald-be .

  # Build AI service nếu folder ai thay đổi
  build-ai:
    needs: [changes, code-quality]
    if: ${{ needs.changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build AI Docker
        run: cd ai && docker build -t emerald-ai .

  # Triển khai Backend (dùng hook của render)
  deploy-backend:
    name: Deploy Backend to Render
    needs: [build-backend]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.be == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Backend Hook
        run: curl -X GET ${{ secrets.RENDER_BE_DEPLOY_HOOK }}

  # Triển khai AI
  deploy-ai:
    name: Deploy AI to Render
    needs: [build-ai]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render AI Hook
        run: curl -X GET ${{ secrets.RENDER_AI_DEPLOY_HOOK }}

  # Mobile release (Build APK khi có Tag)
  release-mobile:
    name: Build & Release APK
    needs: [changes]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Build APK
        run: |
          cd mobile-fe
          npm ci
          cd android && ./gradlew assembleDebug
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-fe/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
