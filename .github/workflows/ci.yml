name: Emerald Skyline CI/CD
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
    tags: ["v*"] # Kích hoạt build Mobile khi tạo tag v1.0.0, v1.1...
  pull_request:
    branches: ["main"]

jobs:
  # Auto label (chỉ chạy trên PR)
  labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: true

  # Phân tích thay đổi (chạy song song với labeler)
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      be: ${{ steps.filter.outputs.be }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            be:     ['be/**']
            web:    ['web-fe/**']
            mobile: ['mobile-fe/**']
            ai:     ['ai/**']

  # Kiểm tra chất lượng code
  code-quality:
    name: Check Quality (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: biomejs/setup-biome@v2
      - run: biome ci --changed --since=main --no-errors-on-unmatched .

  # Chỉ thực hiện ở các folder có thay đổi, và chạy song song để tiết kiệm thời gian
  # Lint Python AI module
  lint-ai:
    name: Lint AI Service (Python)
    needs: [changes]
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          cd ai && pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          cd ai
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest (if tests exist)
        run: |
          cd ai
          pytest --tb=short || echo "No tests found or tests failed - continuing"

  build-backend:
    name: Build Backend (Docker Cache)
    needs: [changes, code-quality]
    if: needs.changes.outputs.be == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Image với cơ chế lưu Cache lên GitHub Actions (GHA)
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./be
          load: true
          tags: emerald-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Size Monitor
        run: |
          echo "### Backend Artifact Report" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Tag | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          docker image ls emerald-be --format "| {{.Repository}} | {{.Tag}} | {{.Size}} |" >> $GITHUB_STEP_SUMMARY

          echo -e "\n**Raw Data (Bytes):**" >> $GITHUB_STEP_SUMMARY
          docker image inspect emerald-be --format '`emerald-be: {{.Size}} bytes`' >> $GITHUB_STEP_SUMMARY

  build-ai:
    name: Build AI Service (Docker Cache)
    needs: [changes, code-quality]
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AI Image
        uses: docker/build-push-action@v6
        with:
          context: ./ai
          load: true
          tags: emerald-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Size Monitor
        run: |
          echo "### AI Service Artifact Report" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Tag | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          docker image ls emerald-ai --format "| {{.Repository}} | {{.Tag}} | {{.Size}} |" >> $GITHUB_STEP_SUMMARY

  build-frontend:
    name: Build React Web
    needs: [changes, code-quality]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web-fe/package-lock.json

      - name: Deterministic Dependency Installation
        run: cd web-fe && npm ci

      - name: Production Build
        run: cd web-fe && npm run build

      - name: Static Assets Analysis
        run: |
          echo "### Frontend Build Analytics" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Directory:** \`web-fe/dist\`" >> $GITHUB_STEP_SUMMARY
          echo -e "\n**Total Bundle Size:**" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          du -sh web-fe/dist 2>/dev/null || du -sh web-fe/build >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo -e "\n**Top 5 Largest Files:**" >> $GITHUB_STEP_SUMMARY
          echo "| File Path | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          find web-fe/dist -type f -exec du -h {} + | sort -rh | head -n 5 | awk '{print "| " $2 " | " $1 " |"}' >> $GITHUB_STEP_SUMMARY

  # Deploy (chỉ khi push lên main)
  deploy-backend:
    name: Deploy Backend to Render
    needs: [changes, build-backend]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.be == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -fsSL -X GET ${{ secrets.RENDER_BE_DEPLOY_HOOK }}

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [changes, build-frontend]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -fsSL -X GET ${{ secrets.VERCEL_DEPLOY_HOOK }}

  # Mobile release (chỉ khi tạo tag v*)
  release-mobile:
    name: Build & Release APK
    needs: [changes]
    if: startsWith(github.ref, 'refs/tags/v') && needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install JS Dependencies
        run: cd mobile-fe && npm ci

      - name: Build APK
        run: cd mobile-fe/android && ./gradlew assembleDebug

      - name: Size Monitor
        run: |
          echo "### APK Size" >> $GITHUB_STEP_SUMMARY
          du -sh mobile-fe/android/app/build/outputs/apk/debug/app-debug.apk \
            >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-fe/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
