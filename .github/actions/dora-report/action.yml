name: DORA Deploy Report
description: Log deploy-focused DORA metrics to GitHub Step Summary
inputs:
  report_title:
    description: Section title shown in step summary
    required: true
  pipeline_start:
    description: Unix epoch seconds captured at pipeline start
    required: false
    default: ""
  deploy_status:
    description: Step outcome for deploy trigger (success, failure, cancelled, skipped)
    required: true
runs:
  using: composite
  steps:
    - name: Generate DORA Report
      shell: bash
      run: |
        DEPLOY_END=$(date -u +%s)
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        {
          echo "### ${{ inputs.report_title }}"
          echo ""
          echo "| DORA Metric | Value |"
          echo "| :--- | :--- |"
          echo "| Deployment Frequency - timestamp | \`${TIMESTAMP}\` |"

          if [ -n "${{ inputs.pipeline_start }}" ]; then
            LEAD_TIME=$(( DEPLOY_END - ${{ inputs.pipeline_start }} ))
            LEAD_MIN=$(( LEAD_TIME / 60 ))
            echo "| Lead Time for Changes | \`${LEAD_MIN} min (${LEAD_TIME}s)\` |"
            if [ "$LEAD_TIME" -lt 3600 ]; then
              echo "| Lead Time status | PASS - Elite (< 1h) |"
            else
              echo "| Lead Time status | FAIL - Exceeds 1h Elite threshold |"
            fi
          fi

          echo "| Change Failure Rate - outcome | \`${{ inputs.deploy_status }}\` |"
          echo "| Commit | \`${{ github.sha }}\` |"

          if [ "${{ inputs.deploy_status }}" = "failure" ]; then
            echo ""
            echo "**DEPLOY FAILED - record \`${TIMESTAMP}\` as MTTR start point**"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
