name: Docker Artifact Report
description: Log Docker image size and cache status to GitHub Step Summary
inputs:
  report_title:
    description: Report title shown in step summary
    required: true
  image_name:
    description: "Local Docker image tag to inspect (for example: emerald-be:latest)"
    required: true
  build_start:
    description: Unix epoch seconds captured before the image build
    required: true
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - name: Generate Docker Report
      shell: bash
      run: |
        if [ -z "${{ inputs.image_name }}" ] || [ -z "${{ inputs.build_start }}" ]; then
          echo "Missing required inputs: image_name and build_start"
          exit 1
        fi

        BUILD_END=$(date -u +%s)
        BUILD_DURATION=$(( BUILD_END - ${{ inputs.build_start }} ))

        IMAGE_REPO="${{ inputs.image_name }}"
        IMAGE_REPO="${IMAGE_REPO%%:*}"

        SIZE_BYTES=$(docker image inspect "${{ inputs.image_name }}" --format '{{.Size}}')

        {
          echo "### ${{ inputs.report_title }}"
          echo ""
          echo "#### Docker Image Size"
          echo "| Repository | Tag | Size |"
          echo "| :--- | :--- | :--- |"
          docker image ls "$IMAGE_REPO" --format "| {{.Repository}} | {{.Tag}} | {{.Size}} |"
          echo "Raw bytes: \`${SIZE_BYTES}\`"
          echo ""
          echo "#### Build Speed and Cache Proxy"
          echo "Build duration: \`${BUILD_DURATION}s\`"
          if [ "$BUILD_DURATION" -lt 60 ]; then
            echo "Cache status: HIT (< 60s)"
          elif [ "$BUILD_DURATION" -lt 300 ]; then
            echo "Cache status: PARTIAL/MISS (60-300s)"
          else
            echo "Cache status: SLOW (> 300s)"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
